name: CGAssistant 全量编译

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 支持手动触发

env:
  QT_VERSION: 5.15.2
  QT_ARCH: win32_msvc2019
  NODE_VERSION: 20.11.1
  BOOST_SUBMODULE_COMMIT: ab7968a # 与仓库内 boost 子模块 commit 对应

jobs:
  build:
    runs-on: windows-2019 # 匹配 VS2019 vc142 工具集要求
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 初始化 MSVC 32位编译环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86
          toolset: 14.2

      - name: 安装 Qt 5.15.2 win32
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: ${{ env.QT_ARCH }}
          dir: ${{ github.workspace }}\Qt
          install-deps: true

      - name: 安装 32位 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          architecture: 'x86'

      - name: 安装 node-gyp 全局依赖
        run: npm install -g node-gyp

      - name: 配置 Qt 环境变量
        run: |
          echo "${{ github.workspace }}\Qt\${{ env.QT_VERSION }}\msvc2019\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "${{ github.workspace }}\Qt\Tools\QtCreator\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 缓存 Boost 编译产物
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: boost
          key: boost-${{ env.BOOST_SUBMODULE_COMMIT }}-vc142-x86-static

      - name: 初始化依赖子模块
        run: cmd /c init-dep.bat

      - name: 编译 Boost 静态库
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: cmd /c build-boost.bat
        timeout-minutes: 60 # Boost 编译耗时较长，预留充足时间

      - name: 编译 CGAHook 注入模块
        run: cmd /c build-CGAHook.bat

      - name: 编译 qhttp 网络库
        run: cmd /c build-qhttp.bat

      - name: 编译 CGAssistant 主程序
        run: cmd /c build-CGAssistant.bat

      - name: 编译 Node.js 原生扩展
        run: cmd /c build-nodegyp.bat

      - name: 部署运行时依赖（windeployqt）
        run: cmd /c windeploy.bat

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: CGAssistant-build-x86
          path: build/
          retention-days: 30
